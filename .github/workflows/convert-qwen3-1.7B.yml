name: Convert Qwen3-1.7B-thinking (v1.2.2, W8A8, 16K, enable_thinking=True)

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: 'Max context limit'
        required: true
        default: '16384'
        type: choice
        options:
          - '4096'
          - '8192'
          - '16384'

env:
  MODEL_NAME: "Qwen3-1.7B-Instruct-2507"
  DEFAULT_CONTEXT: "16384"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install patched RKLLM-Toolkit v1.2.2
        run: |
          mv rkllm_toolkit-1.2.2-cp311-cp311-linux_x86_64_patched.whl rkllm_toolkit-1.2.2-cp311-cp311-linux_x86_64.whl
          pip install rkllm_toolkit-1.2.2-cp311-cp311-linux_x86_64.whl

      - name: Install dependencies
        run: pip install huggingface_hub accelerate

      - name: Add swap (24GB)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 24G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576 status=none
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Download model from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os, subprocess, sys
          model = os.environ['MODEL_NAME']
          local_dir = './' + model
          hf_token = os.environ.get('HF_TOKEN', '')

          # Try HF first (needs token for gated models)
          if hf_token:
              from huggingface_hub import snapshot_download, login
              login(token=hf_token, add_to_git_credential=False)
              print('Trying HuggingFace with token...')
              try:
                  snapshot_download(repo_id='Qwen/'+model, local_dir=local_dir, resume_download=True)
                  print('HF download OK')
                  sys.exit(0)
              except Exception as e:
                  print('HF failed:', e)

          # Fallback: ModelScope (no auth needed)
          print('Trying ModelScope...')
          try:
              subprocess.run([sys.executable, '-m', 'pip', 'install', 'modelscope'], check=True, capture_output=True)
              from modelscope.hub.snapshot_download import snapshot_download as ms_download
              ms_download('Qwen/'+model, local_dir=local_dir, resume_download=True)
              print('ModelScope download OK')
              sys.exit(0)
          except Exception as e:
              print('ModelScope failed:', e)

          print('ERROR: Could not download model from any source')
          sys.exit(1)
          "
          ls -lh $MODEL_NAME/

      - name: Convert to RKLLM (W8A8, 16K, enable_thinking=True)
        env:
          MODEL_PATH: ./${{ env.MODEL_NAME }}
          MAX_CONTEXT: ${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
        run: |
          python3 export_rkllm_qwen3_1.7B.py
          ls -lh *.rkllm

      - name: Rename to desired output
        run: |
          mv -v *-16k.rkllm Qwen3-1.7B-thinking-rk3588-w8a8_g128-16k.rkllm 2>/dev/null || true
          ls -lh *.rkllm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen3-1.7B-thinking-rk3588-w8a8_g128-16k
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
