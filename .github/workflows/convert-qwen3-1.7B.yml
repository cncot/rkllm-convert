name: Convert Qwen3-1.7B-thinking (v1.2.2, W8A8, 16K, enable_thinking=True)

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: 'Max context limit'
        required: true
        default: '16384'
        type: choice
        options:
          - '4096'
          - '8192'
          - '16384'

env:
  REPO_ID: "Qwen/Qwen3-1.7B-Instruct-2507"
  DEFAULT_CONTEXT: "16384"
  ENABLE_THINKING: "true"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install patched RKLLM-Toolkit v1.2.2 (16K)
        run: |
          WHL="rkllm_toolkit-1.2.2-cp311-cp311-linux_x86_64_patched.whl"
          if [ -f "$WHL" ]; then
            echo "Found local whl"
          else
            echo "Downloading whl..."
            pip install requests
            python3 download_whl.py
          fi
          pip install "$WHL"
          echo "RKLLM-Toolkit installed"

      - name: Install dependencies
        run: pip install huggingface_hub accelerate

      - name: Add swap (24GB)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 24G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576 status=none
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Download model from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 download_model_qwen3_1.7B.py

      - name: Convert to RKLLM (W8A8, 16K, enable_thinking=True)
        env:
          MAX_CONTEXT: ${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
        run: |
          python3 export_rkllm_qwen3_1.7B.py
          ls -lh *.rkllm
          cat export_summary.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen3-1.7B-thinking-w8a8_g128-16k
          path: |
            *.rkllm
            export_summary.json
          compression-level: 0
          retention-days: 30
