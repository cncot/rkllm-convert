# =====================================================================
# Qwen3-VL-4B-Instruct -> RKLLM W8A8_G128 16K (v1.3.0)
# Matches proven v1.2.2 workflow structure
# Supports both secrets.HF_TOKEN and manual input
# =====================================================================
name: Qwen3-VL-4B RKLLM v1.3.0 W8A8 [16K]

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: "Max context limit in tokens"
        required: true
        default: "16384"
        type: choice
        options:
          - "4096"
          - "8192"
          - "16384"
      hf_token:
        description: "HuggingFace token (read-only, for gated model Qwen3-VL-4B)"
        required: false
        default: ""
        type: string

env:
  REPO_ID: "Qwen/Qwen3-VL-4B-Instruct"
  DEFAULT_CONTEXT: "16384"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit v1.3.0
        run: |
          wget -q "https://github.com/airockchip/rknn-llm/raw/release-v1.3.0/rkllm-toolkit/packages/rkllm_toolkit-1.3.0-cp311-cp311-linux_x86_64.whl"
          pip install rkllm_toolkit-1.3.0-cp311-cp311-linux_x86_64.whl

      - name: Install dependencies
        run: |
          pip install huggingface_hub accelerate torch torchvision

      - name: Add swap (32GB)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 32G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=32768 status=none
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Download model from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_INPUT: ${{ github.event.inputs.hf_token }}
        run: python3 download_model_vl.py

      - name: Convert to RKLLM (W8A8, 16K)
        env:
          MAX_CONTEXT: ${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
        run: |
          echo "MAX_CONTEXT=$MAX_CONTEXT" >> $GITHUB_ENV
          python3 export_rkllm_qwen3_vl.py

      - name: Rename to short output name
        run: |
          shopt -s nullglob
          files=( *.rkllm )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "WARNING: No .rkllm files found - listing workspace:"
            ls -la
            exit 0
          fi
          echo "Found: ${files[@]}"
          ctx_k=$(( ${MAX_CONTEXT:-16384} / 1024 ))
          target="Qwen3-VL-4B-Instruct-rk3588-w8a8_g128-${ctx_k}k.rkllm"
          if [[ "${files[0]}" != "$target" ]]; then
            mv -v "${files[0]}" "$target"
          else
            echo "Already named correctly: ${files[0]}"
          fi
          ls -lh *.rkllm

      - name: Upload RKLLM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen3-VL-4B-RK3588-v130-W8A8-16K
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
