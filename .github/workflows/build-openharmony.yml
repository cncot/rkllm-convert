# Build OpenHarmony 5.0.3 for Orange Pi 5 Plus (RK3588)
#
# 使用方法：
# 1. 将此文件放到 .github/workflows/ 目录下
# 2. Fork/Push 到你的 GitHub 仓库
# 3. Actions → "Build OpenHarmony" → Run workflow
#
# 产物: 生成可烧录固件 .img 文件（上传至 Artifacts）
# 注意: 源码拉取 + 编译约需 3–5 小时

name: Build OpenHarmony

on:
  workflow_dispatch:
    inputs:
      runner_arch:
        description: 'Runner 架构'
        required: true
        default: 'ubuntu-22.04'
        type: choice
        options:
          - ubuntu-22.04
          - ubuntu-24.04
      product_name:
        description: '编译产品名'
        required: true
        default: 'rk3588'
      branch:
        description: 'OpenHarmony 分支'
        required: true
        default: 'OpenHarmony-5.0.3-Release'

env:
  CCACHE_DIR: /tmp/ccache

concurrency:
  group: build-openharmony-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ inputs.runner_arch || 'ubuntu-22.04' }}
    timeout-minutes: 360

    steps:
      - name: ⚙️ 环境信息
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | awk '/^Mem:/{print $2}')"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}')"
          echo "Product: ${{ inputs.product_name }}"
          echo "Branch: ${{ inputs.branch }}"

      - name: 📦 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            binutils binutils-dev \
            build-essential bison flex \
            python3 python3-pip python3-setuptools python3-wheel python3-paramiko \
            ninja-build cmake ccache \
            git curl wget unzip zip \
            mtools dosfstools \
            libssl-dev libncurses5-dev liblz4-tool \
            libffi-dev libelf-dev libudev-dev libpci-dev \
            libgmp-dev libmpfr-dev libmpc-dev \
            file tree
          sudo pip3 install --quiet setuptools wheel

      - name: 🛠 安装 repo 工具
        run: |
          curl -sL https://mirrors.tuna.tsinghua.edu.cn/git/git-repo/repo -o /tmp/repo
          chmod +x /tmp/repo
          sudo mv /tmp/repo /usr/local/bin/repo
          head -3 /usr/local/bin/repo

      - name: 🔧 配置 Git
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@localhost"

      - name: 📥 获取 OpenHarmony 源码
        shell: bash
        run: |
          set -ex
          mkdir -p "${HOME}/openharmony"
          cd "${HOME}/openharmony"

          echo "=== repo init ==="
          repo init \
            -u https://gitee.com/openharmony/manifest \
            -b "${{ inputs.branch }}" \
            --repo-url=https://mirrors.tuna.tsinghua.edu.cn/git/git-repo \
            --no-repo-verify \
            --depth=1 -q 2>&1

          echo "=== repo sync ==="
          repo sync -c -j$(nproc --ignore=1) --no-tags --no-clone-bundle 2>&1
          echo "=== repo sync done ==="

      - name: 🔍 源码结构诊断
        shell: bash
        run: |
          set -ex
          cd "${HOME}/openharmony"
          echo "=== top-level files/dirs ==="
          ls -la
          echo "=== build scripts ==="
          ls -la build.* Makefile* 2>/dev/null || echo "no build scripts at root"
          find . -maxdepth 1 -type f -executable 2>/dev/null | head -10
          echo "=== build/ directory ==="
          ls build/ 2>/dev/null | head -20 || echo "no build/ dir"
          find . -name "build.sh" -o -name "build.py" 2>/dev/null | head -10
          echo "=== Device configs ==="
          ls -la device/ 2>/dev/null || echo "no device/ dir"
          find device -maxdepth 3 -name "*.json" 2>/dev/null | head -15

      - name: 📥 安装编译工具链
        shell: bash
        run: |
          set -ex
          cd "${HOME}/openharmony"

          # OpenHarmony 5.0.3 可能无 prebuilts_download.sh，用 python 脚本
          if [ -f build/prebuilts_download.sh ]; then
            bash build/prebuilts_download.sh 2>&1
          elif [ -f build/prebuilts_download.py ]; then
            python3 build/prebuilts_download.py 2>&1
          else
            echo "No prebuilts_download script. Checking prebuilts/..."
            ls prebuilts/ 2>/dev/null | head -10 || echo "no prebuilts/"
          fi

      - name: 💾 CCache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ohos-ccache-${{ inputs.product_name }}-${{
            hashFiles('build/**', 'device/**', 'kernel/**') }}
          restore-keys: |
            ohos-ccache-${{ inputs.product_name }}-
            ohos-ccache-

      - name: 🔨 编译 OpenHarmony
        shell: bash
        run: |
          set -ex
          cd "${HOME}/openharmony"

          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_COMPRESS=1
          export CCACHE_COMPRESSLEVEL=6
          export CCACHE_MAXSIZE=10G

          echo "=== Source tree ==="
          du -sh .
          echo "=== Detecting build method ==="

          build_start=$(date +%s)

          # OpenHarmony 5.x build 入口探测
          if [ -x ./build.sh ]; then
            echo "Using: ./build.sh --product-name ${{ inputs.product_name }}"
            ./build.sh \
              --product-name "${{ inputs.product_name }}" \
              --ccache \
              --jobs $(nproc --ignore=1) \
              2>&1 | tee build.log
          elif [ -x build/build.sh ]; then
            echo "Using: build/build.sh --product-name ${{ inputs.product_name }}"
            build/build.sh \
              --product-name "${{ inputs.product_name }}" \
              --ccache \
              --jobs $(nproc --ignore=1) \
              2>&1 | tee build.log
          elif [ -f build.py ]; then
            echo "Using: python3 build.py"
            python3 build.py \
              --product-name "${{ inputs.product_name }}" \
              --ccache \
              --jobs $(nproc --ignore=1) \
              2>&1 | tee build.log
          else
            echo "No recognized build script found."
            echo "Available scripts:"
            find . -maxdepth 2 -name "build*" -type f 2>/dev/null | head -20
            exit 1
          fi

          build_exit=${PIPESTATUS[0]}
          build_end=$(date +%s)
          echo "BUILD_EXIT=${build_exit}" >> "${GITHUB_ENV}"
          echo "BUILD_DURATION=$((build_end - build_start))s" >> "${GITHUB_ENV}"

      - name: 📊 收集构建产物
        if: always()
        shell: bash
        run: |
          cd "${HOME}/openharmony"
          mkdir -p "${HOME}/artifacts"

          echo "=== Looking for images ==="
          find out -name "*.img" -type f 2>/dev/null | head -20 || echo "No images found"
          find . -name "*.img" -type f 2>/dev/null | head -20 || echo "No images at all"
          find out -name "*.bin" -type f 2>/dev/null | head -10 || true

          for img in $(find out -name "*.img" -type f 2>/dev/null); do
            echo "Copying: ${img}"
            cp "${img}" "${HOME}/artifacts/" 2>/dev/null || true
          done

          if [ -f build.log ]; then
            cp build.log "${HOME}/artifacts/"
          fi

          ls -lh "${HOME}/artifacts/" 2>/dev/null || echo "(empty)"

      - name: 📤 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenHarmony-${{ inputs.product_name }}-${{ github.run_id }}
          path: ${{ runner.temp }}/../artifacts/
          retention-days: 7
          compression-level: 6

      - name: 📝 构建摘要
        if: always()
        shell: bash
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'SUMEOF'
          ## Build Summary
          | Item | Value |
          |------|-------|
          | **Status** | ${{ env.BUILD_EXIT == '0' && '✅ Success' || '❌ Failed' }} |
          | **Duration** | ${{ env.BUILD_DURATION }} |
          | **Product** | ${{ inputs.product_name }} |
          | **Branch** | ${{ inputs.branch }} |
          SUMEOF
