# Build OpenHarmony 5.1.0 for Orange Pi 5 Plus
#
# OPC 适配: https://gitcode.com/ohos-porting-communities/vendor_opc
name: Build OpenHarmony

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: '产品名'
        required: true
        default: 'opi5plus'
      branch:
        description: 'OpenHarmony 分支'
        required: true
        default: 'OpenHarmony-5.1.0-Release'
  schedule:
    - cron: '0 8 1 * *'

env:
  CCACHE_DIR: /tmp/ccache
  TAG: OpenHarmony-v5.1.0-Release

concurrency:
  group: build-openharmony-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: ⚙️ 环境信息
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | awk '/^Mem:/{print $2}')"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}')"
          echo "Product: ${{ inputs.product_name }}"

      - name: 📦 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            binutils git git-lfs gnupg flex bison gperf \
            build-essential zip curl zlib1g-dev \
            ccache libxml2-utils xsltproc unzip m4 bc \
            python3-pip ruby default-jdk \
            libssl-dev libtinfo5 \
            mtools dosfstools scons \
            abootimg libelf-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev file tree \
            genext2fs u-boot-tools mtd-utils \
            libgl1-mesa-dev gnutls-bin 2>&1

          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            lib32ncurses5-dev lib32z1-dev libc6-dev-i386 \
            gcc-multilib g++-multilib 2>&1 || echo '[WARN] 32-bit deps failed'

          sudo apt-get install -y -qq gcc-arm-none-eabi 2>&1 || \
          ( sudo add-apt-repository -y ppa:team-gcc-arm-embedded/ppa 2>/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gcc-arm-none-eabi 2>&1 ) || \
          echo '[WARN] gcc-arm-none-eabi not available'

          sudo pip3 install --quiet setuptools wheel requests

      - name: 🛠 安装 repo 工具
        run: |
          curl -sL https://storage.googleapis.com/git-repo-downloads/repo -o /tmp/repo
          chmod +x /tmp/repo
          sudo mv /tmp/repo /usr/local/bin/repo

      - name: 🔧 配置 Git
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@localhost"

      - name: 📥 获取 OpenHarmony 源码 + OPC 设备适配
        shell: bash
        run: |
          set -ex
          mkdir -p "${HOME}/openharmony"
          cd "${HOME}/openharmony"

          # OpenHarmony manifest (gitcode)
          echo '=== repo init ==='
          repo init \
            -u https://gitcode.com/openharmony/manifest \
            -b refs/tags/${{ env.TAG }} \
            --no-repo-verify 2>&1

          echo '=== repo sync ==='
          repo sync -c -j$(nproc --ignore=1) --no-tags --no-clone-bundle 2>&1

          # OPC 适配代码 (全部从 gitcode)
          echo '=== Clone OPC repos ==='
          git clone -b ${{ inputs.branch }} --depth=1 \
            https://gitcode.com/ohos-porting-communities/vendor_opc.git \
            vendor/opc
          git clone -b ${{ inputs.branch }} --depth=1 \
            https://gitcode.com/ohos-porting-communities/device_board_opc.git \
            device/board/opc
          git clone -b ${{ inputs.branch }} --depth=1 \
            https://gitcode.com/ohos-porting-communities/device_soc_opc.git \
            device/soc/opc
          git clone -b ${{ inputs.branch }} --depth=1 \
            https://gitcode.com/ohos-porting-communities/linux_5.10_opi.git \
            kernel/linux/linux-5.10-opi

          echo '=== Done ==='
          ls -la
          du -sh .

      - name: 📥 安装编译工具链 (prebuilts)
        shell: bash
        run: |
          cd "${HOME}/openharmony"
          if [ -f build/prebuilts_download.sh ]; then
            bash build/prebuilts_download.sh 2>&1
          else
            echo '[SKIP] no prebuilts_download.sh'
          fi

      - name: 💾 CCache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ohos-opi5plus-ccache
          restore-keys: ohos-opi5plus-

      - name: 🔨 编译 OpenHarmony (Orange Pi 5 Plus)
        shell: bash
        run: |
          set -ex
          cd "${HOME}/openharmony"

          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_COMPRESS=1
          export CCACHE_COMPRESSLEVEL=6
          export CCACHE_MAXSIZE=10G

          echo '=== Apply x86 patches ==='
          if [ -d vendor/opc/x86_general/patches ]; then
            (cd vendor/opc/x86_general/patches && sh patch.sh 2>&1) || echo '[WARN] patch failed'
          fi

          echo '=== Building: opi5plus ==='
          build_start=$(date +%s)

          ./build.sh \
            --product-name opi5plus \
            --ccache \
            --jobs $(nproc --ignore=1) \
            2>&1 | tee build.log

          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> "${GITHUB_ENV}"
          echo "BUILD_DURATION=$(( $(date +%s) - build_start ))s" >> "${GITHUB_ENV}"

      - name: 📊 收集构建产物
        if: always()
        shell: bash
        run: |
          cd "${HOME}/openharmony"
          mkdir -p "${HOME}/artifacts"

          IMG_DIR="out/opi5plus/packages/phone/images"
          if [ -d "${IMG_DIR}" ]; then
            find "${IMG_DIR}" -name "*.img" -type f | while read f; do
              echo "Copying: ${f}"
              cp "${f}" "${HOME}/artifacts/"
            done
          fi
          find out -name "*.img" -type f 2>/dev/null | while read f; do
            cp "${f}" "${HOME}/artifacts/" 2>/dev/null || true
          done
          test -f build.log && cp build.log "${HOME}/artifacts/"
          ls -lh "${HOME}/artifacts/" || echo '(empty)'

      - name: 📤 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenHarmony-opi5plus-${{ github.run_id }}
          path: ${{ runner.temp }}/../artifacts/
          retention-days: 7

      - name: 📝 构建摘要
        if: always()
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Build Summary
          - **Status**: ${{ env.BUILD_EXIT == '0' && '✅ Success' || '❌ Failed' }}
          - **Duration**: ${{ env.BUILD_DURATION }}
          - **Product**: **opi5plus** (Orange Pi 5 Plus)
          - **Manifest**: gitcode.com/openharmony
          - **OPC**: gitcode.com/ohos-porting-communities
          EOF
