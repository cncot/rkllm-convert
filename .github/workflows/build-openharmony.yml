# Build OpenHarmony 5.0.3 for Orange Pi 5 Plus (RK3588)
name: Build OpenHarmony

on:
  workflow_dispatch:
    inputs:
      runner_arch:
        description: 'Runner 架构'
        required: true
        default: 'ubuntu-22.04'
        type: choice
        options:
          - ubuntu-22.04
          - ubuntu-24.04
      product_name:
        description: '编译产品名'
        required: true
        default: 'rk3588'
      branch:
        description: 'OpenHarmony 分支'
        required: true
        default: 'OpenHarmony-5.0.3-Release'

env:
  CCACHE_DIR: /tmp/ccache

concurrency:
  group: build-openharmony-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ inputs.runner_arch || 'ubuntu-22.04' }}
    timeout-minutes: 360

    steps:
      - name: ⚙️ 环境信息
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | awk '/^Mem:/{print $2}')"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}')"
          echo "Product: ${{ inputs.product_name }}"
          echo "Branch: ${{ inputs.branch }}"

      - name: 📦 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            binutils binutils-dev \
            build-essential bison flex \
            python3 python3-pip python3-setuptools python3-wheel python3-paramiko \
            ninja-build cmake ccache \
            git curl wget unzip zip \
            mtools dosfstools \
            libssl-dev libncurses5-dev liblz4-tool \
            libffi-dev libelf-dev libudev-dev libpci-dev \
            libgmp-dev libmpfr-dev libmpc-dev \
            file tree
          sudo pip3 install --quiet setuptools wheel

      - name: 🛠 安装 repo 工具
        run: |
          curl -sL https://mirrors.tuna.tsinghua.edu.cn/git/git-repo/repo -o /tmp/repo
          chmod +x /tmp/repo
          sudo mv /tmp/repo /usr/local/bin/repo
          python3 /usr/local/bin/repo --version

      - name: 🔧 配置 Git
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@localhost"

      - name: 📥 获取 OpenHarmony 源码
        shell: bash
        run: |
          set -ex
          mkdir -p "${HOME}/openharmony"
          cd "${HOME}/openharmony"

          echo '=== repo init ==='
          repo init \
            -u https://gitcode.com/openharmony/manifest \
            -b "${{ inputs.branch }}" \
            --repo-url=https://mirrors.tuna.tsinghua.edu.cn/git/git-repo \
            --no-repo-verify 2>&1

          echo '=== .repo manifest ==='
          ls -la .repo/
          if [ -f .repo/manifest.xml ]; then
            echo '--- manifest.xml (first 50 lines) ---'
            head -50 .repo/manifest.xml
          fi
          if [ -f .repo/manifests/default.xml ]; then
            echo '--- default.xml (first 50 lines) ---'
            head -50 .repo/manifests/default.xml
          fi
          # also check manifests.git
          find .repo -name "*.xml" -type f 2>/dev/null | head -5

          echo '=== repo sync ==='
          # sync with full output, 4 parallel jobs
          repo sync -c -j4 --no-tags --no-clone-bundle -v 2>&1
          sync_exit=$?
          echo "repo sync exit: ${sync_exit}"

          echo '=== working tree after sync ==='
          ls -la
          echo '--- directories ---'
          find . -maxdepth 2 -type d ! -path './.repo/*' 2>/dev/null | head -40 || echo '(empty)'
          du -sh . 2>/dev/null || true

      - name: 🔍 源码诊断
        shell: bash
        run: |
          cd "${HOME}/openharmony"
          echo "=== top level ==="
          find . -maxdepth 1 ! -name '.repo' ! -name '.' | head -40
          echo "=== build scripts ==="
          find . -maxdepth 3 -name 'build.sh' -o -name 'build.py' -o -name '*.gni' 2>/dev/null | head -20
          echo "=== device dir ==="
          find . -maxdepth 3 -type d -name 'device' 2>/dev/null | head -5
          echo "=== total size ==="
          du -sh . 2>/dev/null || true

      - name: 📥 安装编译工具链
        shell: bash
        run: |
          cd "${HOME}/openharmony" || exit 0
          test -f build/prebuilts_download.sh && bash build/prebuilts_download.sh 2>&1 || \
          test -f build/prebuilts_download.py && python3 build/prebuilts_download.py 2>&1 || \
          echo "[SKIP] no prebuilts download script found"

      - name: 💾 CCache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ohos-ccache-${{ inputs.product_name }}-${{ hashFiles('build/**', 'kernel/**', 'device/**') }}
          restore-keys: |
            ohos-ccache-${{ inputs.product_name }}-
            ohos-ccache-

      - name: 🔨 编译 OpenHarmony
        shell: bash
        run: |
          set -ex
          cd "${HOME}/openharmony"

          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_COMPRESS=1
          export CCACHE_COMPRESSLEVEL=6
          export CCACHE_MAXSIZE=10G

          build_start=$(date +%s)

          SCRIPT=""
          test -x ./build.sh && SCRIPT="./build.sh"
          test -z "$SCRIPT" && test -x build/build.sh && SCRIPT="build/build.sh"
          test -z "$SCRIPT" && test -f build.py && SCRIPT="python3 build.py"

          if [ -n "$SCRIPT" ]; then
            echo "Using: ${SCRIPT} --product-name ${{ inputs.product_name }}"
            ${SCRIPT} \
              --product-name "${{ inputs.product_name }}" \
              --ccache \
              --jobs $(nproc --ignore=1) \
              2>&1 | tee build.log
          else
            echo "No build script found. Listing available scripts:"
            find . -maxdepth 3 -type f \( -name 'build*' -o -name '*.sh' -o -name '*.py' \) 2>/dev/null | grep -v '.repo/' | head -30
            exit 1
          fi

          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> "${GITHUB_ENV}"
          echo "BUILD_DURATION=$(( $(date +%s) - build_start ))s" >> "${GITHUB_ENV}"

      - name: 📊 收集构建产物
        if: always()
        shell: bash
        run: |
          cd "${HOME}/openharmony"
          mkdir -p "${HOME}/artifacts"
          find . -name "*.img" -type f 2>/dev/null | head -20
          find . -name "*.img" -type f 2>/dev/null | while read f; do
            cp "$f" "${HOME}/artifacts/" 2>/dev/null || true
          done
          test -f build.log && cp build.log "${HOME}/artifacts/"
          ls -lh "${HOME}/artifacts/" || echo "(empty)"

      - name: 📤 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenHarmony-${{ inputs.product_name }}-${{ github.run_id }}
          path: ${{ runner.temp }}/../artifacts/
          retention-days: 7

      - name: 📝 构建摘要
        if: always()
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Build Summary
          - **Status**: ${{ env.BUILD_EXIT == '0' && '✅ Success' || '❌ Failed' }}
          - **Duration**: ${{ env.BUILD_DURATION }}
          - **Product**: ${{ inputs.product_name }}
          - **Branch**: ${{ inputs.branch }}
          EOF
