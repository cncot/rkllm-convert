name: Convert Phi-3-Mini-4K-Instruct to RKLLM (W8A8)

on: [workflow_dispatch]

env:
  MODEL_NAME: "microsoft/Phi-3-mini-4k-instruct"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit
        run: |
          pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Download Phi-3-Mini from hf-mirror
        env:
          HF_ENDPOINT: "https://hf-mirror.com"
        run: |
          hf download ${{ env.MODEL_NAME }} \
            --local-dir ./${{ env.MODEL_NAME }}

      - name: Verify model files
        run: |
          ls -lh ./${{ env.MODEL_NAME }}/
          echo "---"
          du -sh ./${{ env.MODEL_NAME }}/

      - name: Convert to RKLLM (W8A8)
        env:
          MODEL_PATH: ./${{ env.MODEL_NAME }}
          RKLLM_DTYPE: auto
        run: python export_rkllm.py

      - name: List output
        run: ls -lh ./*.rkllm

      - name: Upload RKLLM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phi-3-mini-4k-instruct_W8A8_RK3588
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
