name: Convert Phi-3-Mini-4K-Instruct to RKLLM (W8A8)

on:
  workflow_dispatch: {} # manual trigger

env:
  MODEL_NAME: "microsoft/Phi-3-mini-4k-instruct"
  MODEL_SHORT_NAME: "Phi-3-mini-4k-instruct"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit (includes transformers)
        run: |
          pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Download Phi-3-Mini via Python API
        run: |
          python3 -c "
from huggingface_hub import snapshot_download, login
# No login needed for public models
snapshot_download(\"${{ env.MODEL_NAME }}\", local_dir=\"./${{ env.MODEL_SHORT_NAME }}\")
"

      - name: Verify model files
        run: |
          ls -lh ./${{ env.MODEL_SHORT_NAME }}/
          du -sh ./${{ env.MODEL_SHORT_NAME }}/

      - name: Convert to RKLLM (W8A8)
        env:
          MODEL_PATH: ./${{ env.MODEL_SHORT_NAME }}
          RKLLM_DEVICE: cuda
        run: python export_rkllm.py

      - name: List output
        run: ls -lh ./*.rkllm

      - name: Upload RKLLM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODEL_SHORT_NAME }}_W8A8_RK3588
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
