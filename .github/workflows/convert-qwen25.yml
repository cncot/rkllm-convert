name: Convert Qwen2.5-7B-Instruct to RKLLM

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: 'Max context limit'
        required: true
        default: '4096'
        type: choice
        options:
          - '2048'
          - '4096'
          - '8192'

env:
  MODEL_NAME: "Qwen2.5-7B-Instruct"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit
        run: pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download model
        run: |
          python3 -c "from huggingface_hub import snapshot_download; import os; snapshot_download(repo_id='Qwen/'+os.environ['MODEL_NAME'], local_dir='./'+os.environ['MODEL_NAME'], resume_download=True)"

      - name: Set max_context
        env:
          MAX_CTX: ${{ github.event.inputs.max_context || '4096' }}
        run: sed -i "s/max_context=4096/max_context=$MAX_CTX/" export_rkllm.py

      - name: Convert to RKLLM
        env:
          MODEL_PATH: ./${{ env.MODEL_NAME }}
        run: python3 export_rkllm.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen2.5-7B-Instruct_W8A8_RK3588
          path: ./*.rkllm
          compression-level: 0

      - name: Show output
        run: |
          ls -lh *.rkllm
