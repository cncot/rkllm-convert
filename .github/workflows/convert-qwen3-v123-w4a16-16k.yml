# =====================================================================
# Qwen3-4B → RKLLM for RK3588 NPU (v1.3.0)
# 策略: W4A16_G32 → W4A16 → W8A8, 始终 16K 上下文
# v1.3.0 修复了 RK3588 数值溢出 + 优化量化方法
# =====================================================================
name: Qwen3-4B RKLLM v1.3.0 [16K]

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: 'Max context limit in tokens'
        required: true
        default: '16384'
        type: choice
        options:
          - '4096'
          - '8192'
          - '16384'

env:
  REPO_ID: "Qwen/Qwen3-4B-Instruct-2507"
  DEFAULT_CONTEXT: "16384"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit v1.3.0
        run: |
          wget -q "https://github.com/airockchip/rknn-llm/raw/release-v1.3.0/rkllm-toolkit/packages/rkllm_toolkit-1.3.0-cp311-cp311-linux_x86_64.whl"
          pip install rkllm_toolkit-1.3.0-cp311-cp311-linux_x86_64.whl

      - name: Install dependencies
        run: pip install huggingface_hub accelerate

      - name: Check baseline resources
        run: |
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h / /home/runner

      - name: Add swap for model loading (24GB)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          echo "Creating 24GB swap file..."
          sudo fallocate -l 24G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576 status=none
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== After swap ==="
          free -h
          df -h / /home/runner

      - name: Download model from HuggingFace (with retry)
        run: python3 download_model_qwen3.py

      - name: Verify model files
        run: |
          ls -lh $MODEL_PATH/
          echo "---"
          du -sh $MODEL_PATH/
          echo "---"
          ls $MODEL_PATH/*.safetensors 2>/dev/null | wc -l

      - name: Convert to RKLLM
        env:
          MAX_CONTEXT: ${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
        run: python3 export_rkllm_qwen3_w4a16_16k.py

      - name: Show output
        run: ls -lh *.rkllm

      - name: Upload RKLLM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen3-4B-RK3588-v130-16K
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
