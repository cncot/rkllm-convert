name: Convert Qwen3-4B-Instruct-2507 to RKLLM (W8A8)

on:
  workflow_dispatch:
    inputs:
      max_context:
        description: 'Max context limit in tokens'
        required: true
        default: '32768'
        type: choice
        options:
          - '16384'
          - '32768'
          - '65536'

env:
  REPO_ID: "Qwen/Qwen3-4B-Instruct-2507"
  DEFAULT_CONTEXT: "32768"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit
        run: pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Install dependencies
        run: pip install modelscope huggingface_hub accelerate

      - name: Check baseline resources
        run: |
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h / /home/runner

      - name: Add swap for model loading (24GB)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          echo "Creating 24GB swap file..."
          sudo fallocate -l 24G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576 status=none
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== After swap ==="
          free -h
          df -h / /home/runner

      - name: Download model from ModelScope (with retry)
        run: |
          cat > /tmp/download_model.py << 'PYEOF'
import os, time
from modelscope.hub.snapshot_download import snapshot_download

repo_id = os.environ['REPO_ID']
local_dir = f'./{repo_id.replace("/", "-")}'
max_retries = 3

for attempt in range(1, max_retries + 1):
    print(f"Downloading {repo_id} to {local_dir}... (attempt {attempt}/{max_retries})")
    try:
        model_dir = snapshot_download(repo_id, local_dir=local_dir, resume_download=True)
        print(f"Downloaded to: {model_dir}")
        with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write(f"MODEL_PATH={model_dir}\n")
        break
    except Exception as e:
        print(f"Attempt {attempt} failed: {e}")
        if attempt == max_retries:
            raise
        print("Waiting 10s before retry...")
        time.sleep(10)
PYEOF
          python3 /tmp/download_model.py

      - name: Verify model files
        run: |
          ls -lh $MODEL_PATH/
          echo "---"
          du -sh $MODEL_PATH/
          echo "---"
          ls $MODEL_PATH/*.safetensors 2>/dev/null | wc -l

      - name: Convert to RKLLM (W8A8)
        env:
          MAX_CONTEXT: ${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
        run: python3 export_rkllm_qwen3.py

      - name: Show output
        run: ls -lh *.rkllm

      - name: Upload RKLLM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qwen3-4B-Instruct-2507_W8A8_RK3588_${{ github.event.inputs.max_context || env.DEFAULT_CONTEXT }}
          path: ./*.rkllm
          compression-level: 0
          retention-days: 30
