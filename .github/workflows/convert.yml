name: Convert DeepSeek-R1-Distill-Qwen-1.5B to RKLLM

on: [workflow_dispatch]

env:
  MODEL_NAME: "DeepSeek-R1-Distill-Qwen-1.5B"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit
        run: |
          pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Download model via Python
        run: |
          python3 -c "
import os
from huggingface_hub import snapshot_download
model = os.environ['MODEL_NAME']
print(f'Downloading {model}...')
snapshot_download(repo_id=f'deepseek-ai/{model}', local_dir=f'./{model}', resume_download=True)
print('Download complete!')
"

      - name: Convert to RKLLM
        env:
          MODEL_PATH: ./${{ env.MODEL_NAME }}
          HUGGINGFACE_HUB_CACHE: /tmp/hf-cache
        run: python export_rkllm.py

      - name: Upload RKLLM model
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODEL_NAME }}_RK3588
          path: ./*.rkllm
          compression-level: 0
