name: Convert DeepSeek-R1-Distill-Qwen-1.5B to RKLLM

on: [workflow_dispatch]

env:
  MODEL_NAME: "DeepSeek-R1-Distill-Qwen-1.5B"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RKLLM-Toolkit
        run: pip install rkllm_toolkit-1.2.3-cp311-cp311-linux_x86_64.whl

      - name: Download model
        run: |
          python3 -c "from huggingface_hub import snapshot_download; import os; snapshot_download(repo_id='deepseek-ai/'+os.environ['MODEL_NAME'], local_dir='./'+os.environ['MODEL_NAME'], resume_download=True)"

      - name: Convert
        env:
          MODEL_PATH: ./${{ env.MODEL_NAME }}
        run: python export_rkllm.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODEL_NAME }}_RK3588
          path: ./*.rkllm
          compression-level: 0
